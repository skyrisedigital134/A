<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skyrise Digital | Premium Portfolio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #050505; /* Deep Black */
            color: #fff;
            overflow-x: hidden;
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
        }

        /* Premium Gold Gradient Text */
        .hero h1 {
            font-size: 8rem;
            font-weight: 900;
            letter-spacing: -2px;
            background: linear-gradient(to bottom, #f9dfa1 0%, #d4af37 50%, #b8860b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 0.9;
            opacity: 0;
            transform: translateY(50px);
        }

        .hero p {
            font-size: 1.2rem;
            color: #888;
            margin-top: 20px;
            letter-spacing: 4px;
            text-transform: uppercase;
            opacity: 0;
        }

        /* Floating Light Effect (The "Premium" touch) */
        .light-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.15) 0%, rgba(0,0,0,0) 70%);
            filter: blur(50px);
            z-index: -1;
        }

        /* CTA Button */
        .cta {
            margin-top: 40px;
            padding: 15px 40px;
            border: 1px solid #d4af37;
            background: transparent;
            color: #d4af37;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s ease;
            opacity: 0;
            border-radius: 50px;
        }

        .cta:hover {
            background: #d4af37;
            color: #000;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }

    </style>
</head>
<body>

    <section class="hero">
        <div class="light-glow"></div>
        <p id="sub-text">Website Designer & Developer</p>
        <h1 id="main-title">SKYRISE<br>DIGITAL</h1>
        <button class="cta" id="cta-btn">View My Work</button>
    </section>

    <script>
        // GSAP Animation Sequence
        const tl = gsap.timeline();

        tl.to("#sub-text", {
            opacity: 1,
            y: -10,
            duration: 1,
            ease: "power4.out"
        })
        .to("#main-title", {
            opacity: 1,
            y: 0,
            duration: 1.5,
            ease: "expo.out"
        }, "-=0.5")
        .to("#cta-btn", {
            opacity: 1,
            duration: 1,
            ease: "power2.out"
        }, "-=0.8");

        // Mouse Move Glow Effect
        document.addEventListener('mousemove', (e) => {
            const glow = document.querySelector('.light-glow');
            const x = e.clientX;
            const y = e.clientY;
            
            gsap.to(glow, {
                x: x - window.innerWidth / 2,
                y: y - window.innerHeight / 2,
                duration: 2,
                ease: "power2.out"
            });
        });
    </script>
</body>
</html>
