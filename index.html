<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skyrise Digital | Mobile Premium</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Inter', sans-serif;
            scroll-snap-type: y mandatory; /* Instagram Reels style snap */
            overflow-y: scroll;
        }

        section {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 30px;
            position: relative;
        }

        /* 1. Hero Section Mobile */
        .hero h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: 15vw;
            line-height: 0.9;
            text-transform: uppercase;
            background: linear-gradient(135deg, #fff 0%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 14px;
            letter-spacing: 3px;
            color: #666;
            margin-bottom: 10px;
        }

        /* 2. Mobile Project Cards */
        .project-card {
            width: 100%;
            height: 70vh;
            background: #111;
            border-radius: 24px;
            margin-top: 20px;
            overflow: hidden;
            position: relative;
            border: 1px solid #222;
        }

        .project-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.6;
        }

        .project-info {
            position: absolute;
            bottom: 30px;
            left: 30px;
        }

        .project-info h2 {
            font-family: 'Syncopate', sans-serif;
            font-size: 24px;
            color: var(--gold);
        }

        /* 3. Floating Contact Button */
        .contact-fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: var(--gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3);
        }

    </style>
</head>
<body>

    <a href="#" class="contact-fab">📩</a>

    <section class="hero">
        <p>SKYRISE DIGITAL</p>
        <h1 id="hero-title">BEYOND<br>MOBILE</h1>
        <div style="width: 50px; height: 2px; background: var(--gold); margin-top: 20px;"></div>
    </section>

    <section>
        <div class="project-card">
            <img class="project-img" src="https://images.unsplash.com/photo-1551288049-bebda4e38f71?auto=format&fit=crop&w=800&q=80">
            <div class="project-info">
                <p style="font-size: 12px; color: #aaa;">01 / WEB DESIGN</p>
                <h2>THE DHOL NATION</h2>
            </div>
        </div>
    </section>

    <section>
        <div class="project-card">
            <img class="project-img" src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&w=800&q=80">
            <div class="project-info">
                <p style="font-size: 12px; color: #aaa;">02 / BRANDING</p>
                <h2>SHERE PUNJAB</h2>
            </div>
        </div>
    </section>

    <section style="text-align: center; justify-content: center; align-items: center;">
        <h2 style="font-family: 'Syncopate'; font-size: 10vw;">LET'S WORK</h2>
        <p style="margin-top: 20px; color: #888;">Available for new projects</p>
    </section>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        // Hero Entrance
        gsap.from("#hero-title", {
            y: 50,
            opacity: 0,
            duration: 1.2,
            ease: "power4.out"
        });

        // Cards Animation as you scroll
        gsap.utils.toArray(".project-card").forEach(card => {
            gsap.from(card, {
                scrollTrigger: {
                    trigger: card,
                    start: "top 90%",
                },
                scale: 0.9,
                opacity: 0,
                duration: 1,
                ease: "back.out(1.7)"
            });
        });
    </script>
</body>
</html>
