<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | SkyRise Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --accent-blue: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(56, 189, 248, 0.1);
        }

        .logo { height: 50px; }
        .nav-links { display: flex; list-style: none; gap: 30px; }
        .nav-links a { color: var(--text-dim); text-decoration: none; font-size: 0.95rem; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: var(--accent-blue); }

        /* Contact Section */
        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 8%;
            text-align: center;
        }

        .header h1 {
            font-size: 3.5rem;
            margin-bottom: 15px;
            background: linear-gradient(to right, #fff, var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .contact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1100px;
            margin-top: 50px;
        }

        .contact-card {
            background: var(--bg-card);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-decoration: none;
            color: white;
            transition: 0.4s;
        }

        .contact-card:hover {
            border-color: var(--accent-blue);
            transform: translateY(-10px);
            box-shadow: 0 15px 35px rgba(56, 189, 248, 0.1);
        }

        .contact-card i {
            font-size: 45px;
            color: var(--accent-blue);
            margin-bottom: 20px;
        }

        .contact-card h3 {
            font-size: 1.4rem;
            margin-bottom: 10px;
        }

        .contact-card p {
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        /* Instagram Button */
        .social-link {
            margin-top: 60px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 15px 40px;
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent-blue);
            border: 1px solid var(--accent-blue);
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            transition: 0.4s;
        }

        .social-link:hover {
            background: var(--accent-blue);
            color: var(--bg-dark);
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.4);
        }

        footer {
            padding: 40px;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 14px;
            color: var(--text-dim);
        }
    </style>
</head>
<body>

    <nav>
        <img src="logo.png" alt="SkyRise" class="logo">
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="portfolio.html">Work</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
    </nav>

    <div class="container" data-aos="zoom-in">
        <div class="header">
            <h1>Connect With Us</h1>
            <p style="color: var(--text-dim);">Let's discuss your next big digital project.</p>
        </div>

        <div class="contact-grid">
            <a href="mailto:skyrisedigital00@gmail.com" class="contact-card" data-aos="fade-up">
                <i class="fa-solid fa-envelope-open-text"></i>
                <h3>Email</h3>
                <p>skyrisedigital00@gmail.com</p>
            </a>

            <a href="https://wa.me/918218440133" class="contact-card" data-aos="fade-up" data-aos-delay="100">
                <i class="fa-brands fa-whatsapp"></i>
                <h3>WhatsApp</h3>
                <p>+91 8218440133</p>
            </a>

            <a href="tel:+918218440133" class="contact-card" data-aos="fade-up" data-aos-delay="200">
                <i class="fa-solid fa-phone-volume"></i>
                <h3>Call Us</h3>
                <p>Direct Consultation</p>
            </a>
        </div>

        <a href="https://www.instagram.com/skyrisedigital" target="_blank" class="social-link">
            <i class="fa-brands fa-instagram"></i> Follow @skyrisedigital
        </a>
    </div>

    <footer>
        &copy; 2026 SkyRise Digital | Innovating the Web
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });
    </script>
</body>
</html>
